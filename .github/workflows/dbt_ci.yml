name: dbt CI

on:
  push:
    branches: 
      - main   # parte quando fai push su main
  pull_request:
    branches:
      - main   # parte anche su PR verso main
jobs:
  dbt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dbt AND dependencies
        run: |
          pip install dbt-bigquery

      - name: Run dbt build
        run: |
          cd ecommerce_dbt
          dbt deps
          dbt build --profiles-dir .